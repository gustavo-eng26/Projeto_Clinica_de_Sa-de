<svg viewBox="0 0 200 240" xmlns="http://www.w3.org/2000/svg" width="40" height="48">
  <!-- Raízes -->
  <g id="roots">
    <path d="M 85 130 Q 70 145 60 160" stroke="#8B6F47" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 100 130 Q 100 150 100 165" stroke="#8B6F47" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M 115 130 Q 130 145 140 160" stroke="#8B6F47" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Tronco -->
  <ellipse cx="100" cy="110" rx="8" ry="25" fill="#8B6F47"/>
  
  <!-- Folhas - círculos em degradê -->
  <g id="leaves">
    <!-- Camada superior (verde escuro) -->
    <circle cx="70" cy="70" r="8" fill="#6B8E23"/>
    <circle cx="80" cy="50" r="9" fill="#7BA428"/>
    <circle cx="100" cy="40" r="10" fill="#8FBC3F"/>
    <circle cx="120" cy="50" r="9" fill="#7BA428"/>
    <circle cx="130" cy="70" r="8" fill="#6B8E23"/>
    
    <!-- Camada intermediária (verde médio) -->
    <circle cx="60" cy="85" r="7" fill="#9ACD32"/>
    <circle cx="75" cy="75" r="8" fill="#ADFF2F"/>
    <circle cx="100" cy="60" r="9" fill="#BFEF45"/>
    <circle cx="125" cy="75" r="8" fill="#ADFF2F"/>
    <circle cx="140" cy="85" r="7" fill="#9ACD32"/>
    
    <!-- Camada inferior (verde claro/amarelo) -->
    <circle cx="65" cy="100" r="6" fill="#D4AF37"/>
    <circle cx="85" cy="95" r="7" fill="#DAA520"/>
    <circle cx="115" cy="95" r="7" fill="#DAA520"/>
    <circle cx="135" cy="100" r="6" fill="#D4AF37"/>
  </g>
  
  <!-- Círculo central (ponto focal) -->
  <circle cx="100" cy="105" r="4" fill="#228B22" opacity="0.7"/>
</svg>
