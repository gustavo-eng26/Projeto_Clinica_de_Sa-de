<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Folhas externas (arranjo circular) -->
  <g id="outer-leaves">
    <!-- Folha superior -->
    <ellipse cx="200" cy="40" rx="18" ry="35" fill="#2D7A6F" transform="rotate(0 200 40)"/>
    
    <!-- Folhas superiores direita -->
    <ellipse cx="245" cy="55" rx="18" ry="35" fill="#3D8F7F" transform="rotate(40 245 55)"/>
    <ellipse cx="270" cy="95" rx="18" ry="35" fill="#2D7A6F" transform="rotate(70 270 95)"/>
    
    <!-- Folhas direita -->
    <ellipse cx="285" cy="145" rx="18" ry="35" fill="#4BA39E" transform="rotate(100 285 145)"/>
    <ellipse cx="280" cy="190" rx="18" ry="35" fill="#3D8F7F" transform="rotate(130 280 190)"/>
    
    <!-- Folhas inferiores direita -->
    <ellipse cx="245" cy="235" rx="18" ry="35" fill="#2D7A6F" transform="rotate(160 245 235)"/>
    
    <!-- Folhas inferiores esquerda -->
    <ellipse cx="155" cy="235" rx="18" ry="35" fill="#2D7A6F" transform="rotate(-160 155 235)"/>
    
    <!-- Folhas esquerda -->
    <ellipse cx="120" cy="190" rx="18" ry="35" fill="#3D8F7F" transform="rotate(-130 120 190)"/>
    <ellipse cx="115" cy="145" rx="18" ry="35" fill="#4BA39E" transform="rotate(-100 115 145)"/>
    
    <!-- Folhas superiores esquerda -->
    <ellipse cx="130" cy="95" rx="18" ry="35" fill="#2D7A6F" transform="rotate(-70 130 95)"/>
    <ellipse cx="155" cy="55" rx="18" ry="35" fill="#3D8F7F" transform="rotate(-40 155 55)"/>
  </g>
  
  <!-- Folhas internas (segundo nível) -->
  <g id="inner-leaves">
    <!-- Folhas internas superiores -->
    <ellipse cx="200" cy="70" rx="13" ry="28" fill="#5BA9A1" transform="rotate(0 200 70)"/>
    <ellipse cx="235" cy="85" rx="13" ry="28" fill="#4BA39E" transform="rotate(45 235 85)"/>
    <ellipse cx="248" cy="130" rx="13" ry="28" fill="#5BA9A1" transform="rotate(90 248 130)"/>
    
    <!-- Folhas internas direita -->
    <ellipse cx="238" cy="170" rx="13" ry="28" fill="#4BA39E" transform="rotate(135 238 170)"/>
    
    <!-- Folhas internas esquerda -->
    <ellipse cx="162" cy="170" rx="13" ry="28" fill="#4BA39E" transform="rotate(-135 162 170)"/>
    <ellipse cx="152" cy="130" rx="13" ry="28" fill="#5BA9A1" transform="rotate(-90 152 130)"/>
    <ellipse cx="165" cy="85" rx="13" ry="28" fill="#4BA39E" transform="rotate(-45 165 85)"/>
  </g>
  
  <!-- Folha central principal (grande) -->
  <g id="center-leaf">
    <path d="M 200 90 Q 215 150 210 200 Q 200 220 200 240" stroke="#2D5F54" stroke-width="8" fill="none" stroke-linecap="round"/>
    <ellipse cx="200" cy="110" rx="20" ry="40" fill="#6BC5BD" transform="rotate(0 200 110)"/>
    <path d="M 195 120 Q 195 150 200 180" stroke="#2D5F54" stroke-width="2" fill="none"/>
  </g>
  
  <!-- Tronco -->
  <g id="trunk">
    <path d="M 200 240 Q 195 290 190 340 Q 188 360 200 380" stroke="#2D5F54" stroke-width="25" fill="none" stroke-linecap="round"/>
    <path d="M 200 240 Q 205 290 210 340 Q 212 360 200 380" stroke="#1F4A42" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Raízes -->
  <g id="roots">
    <path d="M 200 380 Q 170 410 150 430" stroke="#2D5F54" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 200 380 Q 200 415 200 435" stroke="#2D5F54" stroke-width="12" fill="none" stroke-linecap="round"/>
    <path d="M 200 380 Q 230 410 250 430" stroke="#2D5F54" stroke-width="12" fill="none" stroke-linecap="round"/>
  </g>
  
  <!-- Texto "Harmonia" -->
  <text x="200" y="460" font-family="Arial, sans-serif" font-size="52" font-weight="bold" text-anchor="middle" fill="#2D5F54" letter-spacing="2">
    Harmonia
  </text>
  
  <!-- Linhas decorativas e texto "Terapias" -->
  <line x1="90" y1="485" x2="160" y2="485" stroke="#2D5F54" stroke-width="2" opacity="0.6"/>
  <text x="200" y="495" font-family="Arial, sans-serif" font-size="28" text-anchor="middle" fill="#2D5F54" letter-spacing="1">
    Terapias
  </text>
  <line x1="240" y1="485" x2="310" y2="485" stroke="#2D5F54" stroke-width="2" opacity="0.6"/>
</svg>
